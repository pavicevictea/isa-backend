version: '3.8'
services:
  db:
    image: postgres:15
    container_name: isa-db
    environment:
      POSTGRES_DB: isa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"

  api-replica-1:
    build: .
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=db
      - DB_NAME=isa
      - DB_USER=postgres
      - DB_PASS=root
    depends_on:
      - db

  api-replica-2:
    build: .
    ports:
      - "8082:8080"
    environment:
      - DB_HOST=db
      - DB_NAME=isa
      - DB_USER=postgres
      - DB_PASS=root
    depends_on:
      - db

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api-replica-1
      - api-replica-2

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=123